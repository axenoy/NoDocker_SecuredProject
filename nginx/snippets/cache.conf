# Enable proxy caching using the defined cache zone.
proxy_cache for_cache;

# Do not cache POST/PUT(unsafe) methods.
proxy_cache_methods GET HEAD;

# Unique cache key.
proxy_cache_key "$scheme$request_method$host$request_uri"; 

proxy_cache_valid 200 302 10m; # Cache successful resposes.
proxy_cache_valid 404 500 502 1m; # Cache error responces.

# Check with backend if cached responce is still valid before using it.
proxy_cache_revalidate on;

# Use old cache if backend is down, slow or returns errors.
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504 http_429;

proxy_cache_lock on; # 100 req = 1req to node.js
proxy_cache_lock_timeout 5s;

# Cache only after at least twice resource requests.
# Avoid caching rarely used content.
proxy_cache_min_uses 2;

# Allow to return old cache while the new one in backround updating.
proxy_cache_background_update on;

# Bypass cache if session cookie is present (authenticated users). 
proxy_cache_bypass $cookie_session;
proxy_no_cache $cookie_session;

# Do not cache responses that set cookies.
proxy_no_cache $http_set_cookie;

# Header to indicate cache status.
add_header X-Cache-Status $upstream_cache_status always;