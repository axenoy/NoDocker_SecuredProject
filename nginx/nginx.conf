# Automatically set the number of worker processes based on available CPU cores.
worker_processes auto;

# Optional: bind workers to CPU cores automatically.
# Useful only for high-load or bare-metal environments.
### worker_cpu_affinity auto;

# PID file where nginx writes the main PID.
pid /run/nginx.pid;

events {
    # Maximum number of simultaneous connections per worker process.
    # Example: 4 cores * 1024 = 4096 simultaneous connections possible.
    worker_connections 1024;

    # Accept as many connections as possible at once.
    # Multi connection accept is off, there wont be high-load. 
    multi_accept off;
}

http {
    # Load standard MIME types for proper content-type headers.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Include gzip and brotli compression.
    include /etc/nginx/snippets/compression.conf;

    # Hide nginx version in headers and error pages.
    server_tokens off;

    # Return 404 instead of 503 when rate limit is exceeded.
    limit_req_status 404;
    
    # Backend cluster definition.
    upstream backend_cluster {
        # Primary backend server.
        server 127.0.0.1:3000 max_fails=5 fail_timeout=30s;

        # Backup server used only if the primary is unavailable.
        server 127.0.0.1:3001 backup;

        # Number of idle keepalive connecions to upstream servers.
        keepalive 32;
    }

    # Global TCP keepalive settings for client connections.
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Proxy cache cofiguration.
    proxy_cache_path /var/cache/nginx 
        levels=1:2 
        keys_zone=for_cache:10m 
        max_size=1g 
        inactive=60m # Remove inactive after 60 minutes.
        use_temp_path=off; # Write temp files directly to cache directory instead /tmp.

    # Rate limiting for regular users.
    limit_req_zone $binary_remote_addr zone=usr_limit:10m rate=30r/s;
    # For admin area.
    limit_req_zone $binary_remote_addr zone=adm_limit:10m rate=5r/s;

    # SSL/TLS session settings.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Allowed TLS versions.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Prefer server defined ssl_protocols.
    ssl_prefer_server_ciphers on;

    # Disable tickets.
    ssl_session_tickets off;

    # Drop requests made directly to IP (for HTTP).
    server {
        listen 80 default_server;
        server_name _;

        # Disable logging.
        access_log off;
        error_log /dev/null crit;

        return 444;
    }

    # Drop requests made directly to IP (for HTTPS).
    server {
        listen 443 ssl default_server;
        server_name _;

        # Dummy certificate (required for SSL context).
        ssl_certificate /etc/nginx/ssl/dummy.crt;
        ssl_certificate_key /etc/nginx/ssl/dummy.key;

        access_log off;
        error_log /dev/null crit;

        return 444;
    }

    # Redirect HTTP to HTTPS and URI safe.
    server {
        listen 80;
        server_name www.example.com;

        return 301 https://$host$request_uri;
    }

    # Main HTTPS server.
    server {
        listen 443 ssl http2;
        server_name www.example.com; 

        ssl_certificate /etc/nginx/ssl/localhost.com.crt;
        ssl_certificate_key /etc/nginx/ssl/localhost.com.key;

        # Security headers to protect against clickjacking, MIME sniffing, XSS.
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self';" always;

        # Site-specific access and error logs. 
        # Could be in http block when only 1 site in use.
        access_log /var/log/nginx/example.com.access.log;
        error_log /var/log/nginx/example.com.error.log warn;

        # Hide backend/internal errors.
        error_page 429 502 503 =404;

        # Main location.
        location / {
            # Two-stage rate limiting:
            # burst is queue size for spikes. 
            # delay is portion of requests intentionally delayed to smooth traffic.
            # nodelay may cause sudden load spikes on backend.
            limit_req zone=usr_limit burst=12 delay=8;  

            # User site configuration.
            include /etc/nginx/sites/user.conf;
            # Cache.
            include /etc/nginx/snippets/cache.conf;
            # Proxy.
            include /etc/nginx/snippets/proxy.conf;

            # Proxy requests to backend cluster.
            proxy_pass http://backend_cluster; 
        }

        location /api {
            limit_req zone=usr_limit burst=20 delay=10;

            include /etc/nginx/snippets/proxy.conf; # 30s proxy.
            include /etc/nginx/snippets/cache.conf;
            include /etc/nginx/snippets/api.conf; # Then tuning on top of the config.

            proxy_pass http://backend_cluster;
        }

        # Health check.
        location /health {

            include /etc/nginx/snippets/health.conf;
            include /etc/nginx/snippets/proxy.conf;

            proxy_pass http://backend_cluster;
        }

        # Admin panel. 
        location ^~ /admin {
            # Stricter RPS for admin endpoints.
            limit_req zone=adm_limit burst=10 delay=5;

            include /etc/nginx/sites/admin.conf;

            proxy_pass http://backend_cluster;
        }
    }
# Example for additional sites:
